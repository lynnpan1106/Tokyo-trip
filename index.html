<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>東京旅遊 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'morandi-rose': '#bf9d96',
                        'cocoa-brown': '#6f5643',
                        'oatmeal': '#f4f1ea',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f4f1ea; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; color: #555; overflow-x: hidden; }
        .active-day { background-color: #bf9d96 !important; color: white !important; transform: scale(1.05); }
        .active-tab { border-bottom: 3px solid #bf9d96; color: #6f5643 !important; font-weight: 800; }
        .glass-nav { background: rgba(244, 241, 234, 0.98); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding-bottom: env(safe-area-inset-bottom); }
        .checked-text { text-decoration: line-through; opacity: 0.5; }
        .hidden-section { display: none !important; }
        .swipe-item { position: relative; overflow: hidden; transition: transform 0.3s ease; border-radius: 1.25rem; background: #e5a9a9; }
        .swipe-content { position: relative; z-index: 2; transition: transform 0.3s ease; background: white; cursor: pointer; }
        .swipe-delete-btn { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; color: white; display: flex; align-items: center; justify-content: center; z-index: 1; font-size: 0.85rem; font-weight: bold; }
        .swiped .swipe-content { transform: translateX(-80px); }
    </style>
</head>
<body class="pb-48">

    <header class="sticky top-0 z-30 bg-oatmeal/95 backdrop-blur-sm p-5 border-b border-[#e2dfd9] text-center shadow-sm">
        <h1 id="main-title" class="text-xl font-extrabold text-cocoa-brown tracking-widest">東京行程 2026</h1>
        <div class="flex items-center justify-center gap-2 mt-2">
            <p id="sub-title" class="text-xs text-gray-500 font-medium">2026/04/10 (五)</p>
            <span class="text-gray-300">|</span>
            <div id="weather-box" class="flex items-center gap-1.5 text-xs text-slate-500 font-bold">
                <i id="weather-icon" class="fas fa-sun text-slate-400"></i>
                <span id="weather-temp">讀取中...</span>
            </div>
        </div>
    </header>

    <main id="itinerary-section" class="relative p-6 max-w-md mx-auto min-h-screen">
        <div id="timeline-content"></div>
    </main>

    <main id="checklist-section" class="hidden-section p-6 max-w-md mx-auto min-h-screen">
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-[#eee8df]">
            <h2 class="text-lg font-bold text-cocoa-brown mb-4">行前準備</h2>
            <div class="flex gap-2 mb-6">
                <input type="text" id="todo-input" placeholder="新增清單..." class="flex-1 px-4 py-2 rounded-xl border border-gray-100 bg-gray-50 text-sm focus:outline-none">
                <button onclick="addTodo()" class="bg-morandi-rose text-white px-5 py-2 rounded-xl text-sm font-bold">新增</button>
            </div>
            <ul id="todo-list" class="space-y-3"></ul>
        </div>
    </main>

    <main id="shopping-section" class="hidden-section p-6 max-w-md mx-auto min-h-screen">
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-[#eee8df]">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-cocoa-brown">購物清單</h2>
                <button onclick="clearBoughtItems()" class="text-[10px] text-morandi-rose border border-morandi-rose px-2 py-1 rounded-lg font-bold">清除已買項目</button>
            </div>
            <div class="space-y-3 mb-6 p-4 bg-gray-50 rounded-2xl border border-gray-100 text-sm">
                <input type="text" id="shop-name" placeholder="商品名稱" class="w-full px-3 py-2 rounded-lg border border-gray-100 focus:outline-none">
                <div class="flex gap-2 items-center">
                    <input type="number" id="shop-count" placeholder="數量" class="w-20 px-3 py-2 rounded-lg border border-gray-100 focus:outline-none">
                    <input type="file" id="shop-file" accept="image/*" class="hidden" onchange="previewFile()">
                    <button onclick="document.getElementById('shop-file').click()" class="flex-1 bg-white border border-gray-200 text-gray-400 py-2 rounded-lg text-xs flex items-center justify-center gap-1"><i class="fas fa-camera"></i> <span id="file-status">拍商品圖</span></button>
                </div>
                <div id="img-preview-box" class="hidden w-full h-32 rounded-lg overflow-hidden border border-dashed border-gray-300 mt-2"><img id="img-preview" src="" class="w-full h-full object-cover"></div>
                <button onclick="addShopItem()" class="w-full mt-2 bg-cocoa-brown text-white py-2 rounded-lg font-bold">新增</button>
            </div>
            <div id="shop-list" class="space-y-4"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass-nav border-t border-[#e2dfd9] z-40 shadow-2xl">
        <div id="date-nav" class="flex justify-around items-center px-4 pt-4 pb-2">
            <button onclick="renderDay(1)" id="btn-1" class="w-11 h-11 rounded-2xl bg-white text-[10px] font-black border border-gray-200 flex flex-col items-center justify-center transition-all active-day"><span>D1</span><span>4/10</span></button>
            <button onclick="renderDay(2)" id="btn-2" class="w-11 h-11 rounded-2xl bg-white text-[10px] font-black border border-gray-200 flex flex-col items-center justify-center transition-all text-gray-400"><span>D2</span><span>4/11</span></button>
            <button onclick="renderDay(3)" id="btn-3" class="w-11 h-11 rounded-2xl bg-white text-[10px] font-black border border-gray-200 flex flex-col items-center justify-center transition-all text-gray-400"><span>D3</span><span>4/12</span></button>
            <button onclick="renderDay(4)" id="btn-4" class="w-11 h-11 rounded-2xl bg-white text-[10px] font-black border border-gray-200 flex flex-col items-center justify-center transition-all text-gray-400"><span>D4</span><span>4/13</span></button>
            <button onclick="renderDay(5)" id="btn-5" class="w-11 h-11 rounded-2xl bg-white text-[10px] font-black border border-gray-200 flex flex-col items-center justify-center transition-all text-gray-400"><span>D5</span><span>4/14</span></button>
        </div>
        <div class="flex justify-around items-center py-2 px-2 border-t border-gray-200/50 mt-2">
            <button onclick="switchTab('itinerary')" id="nav-itinerary" class="flex-1 py-2 text-[13px] font-bold text-morandi-rose active-tab">行程</button>
            <button onclick="switchTab('checklist')" id="nav-checklist" class="flex-1 py-2 text-[13px] font-bold text-gray-400">行前準備</button>
            <button onclick="switchTab('shopping')" id="nav-shopping" class="flex-1 py-2 text-[13px] font-bold text-gray-400">購物清單</button>
        </div>
    </nav>

    <script>
        const itinerary = {
            1: { title: "Day 1：啟程與新宿", date: "2026/04/10 (五)", events: [
                [span_0](start_span){ time: "08:30", icon: "plane", title: "星宇 JX800 出發", desc: "桃園 08:30 → 12:55 抵達成田[span_0](end_span)" },
                [span_1](start_span){ time: "13:44", icon: "train", title: "搭乘 N'EX", desc: "買來回票 5,200円[span_1](end_span)" },
                [span_2](start_span){ time: "16:00", icon: "hotel", title: "飯店 Check-in", desc: "tokyo sky dream shinjuku[span_2](end_span)" },
                [span_3](start_span){ time: "17:00", icon: "torii-gate", title: "新宿花園神社", desc: "新宿三丁目站E2出口[span_3](end_span)" },
                [span_4](start_span){ time: "18:00", icon: "shopping-bag", title: "新宿逛街", desc: "扭蛋森林、LUMINE[span_4](end_span)" }
            ]},
            2: { title: "Day 2：河口湖探險", date: "2026/04/11 (六)", events: [
                [span_5](start_span){ time: "08:30", icon: "train", title: "富士回遊 08:30", desc: "新宿車站 → 10:21 富士山站[span_5](end_span)" },
                [span_6](start_span){ time: "13:00", icon: "car", title: "河口湖租車", desc: "TOYOTA 租車公司[span_6](end_span)" },
                [span_7](start_span){ time: "14:30", icon: "camera", title: "忍野八海", desc: "富士山雪水湧泉[span_7](end_span)" },
                [span_8](start_span){ time: "15:50", icon: "torii-gate", title: "北口本宮富士淺間神社", desc: "千年森林神社[span_8](end_span)" }
            ]},
            3: { title: "Day 3：逆富士與花海", date: "2026/04/12 (日)", events: [
                [span_9](start_span){ time: "06:00", icon: "camera", title: "河口湖大橋逆富士", desc: "日出後30分鐘最佳[span_9](end_span)" },
                [span_10](start_span){ time: "07:00", icon: "torii-gate", title: "新倉富士淺間神社", desc: "五重塔+富士山[span_10](end_span)" },
                [span_11](start_span){ time: "10:00", icon: "tree", title: "富士芝櫻祭", desc: "門票900元[span_11](end_span)" },
                [span_12](start_span){ time: "13:00", icon: "camera", title: "大石公園", desc: "白天花海版富士山[span_12](end_span)" }
            ]},
            4: { title: "Day 4：天上山與池袋", date: "2026/04/13 (一)", events: [
                [span_13](start_span){ time: "09:30", icon: "mountain", title: "天上山公園纜車", desc: "兔子神社[span_13](end_span)" },
                [span_14](start_span){ time: "14:08", icon: "train", title: "搭車回新宿", desc: "14:08 出發-16:08 新宿[span_14](end_span)" },
                [span_15](start_span){ time: "18:00", icon: "shopping-bag", title: "池袋逛街", desc: "太陽城、LUMINE[span_15](end_span)" }
            ]},
            5: { title: "Day 5：淺草與返台", date: "2026/04/14 (二)", events: [
                [span_16](start_span){ time: "09:00", icon: "torii-gate", title: "淺草寺/雷門", desc: "仲見世商店街[span_16](end_span)" },
                [span_17](start_span){ time: "10:30", icon: "utensils", title: "晴空塔敘敘苑", desc: "30F 絕景燒肉[span_17](end_span)" },
                [span_18](start_span){ time: "14:00", icon: "shopping-bag", title: "東京車站", desc: "地下街採買伴手禮[span_18](end_span)" },
                [span_19](start_span){ time: "16:20", icon: "plane", title: "返台起飛", desc: "N'EX 12:08-13:23[span_19](end_span)" }
            ]}
        };

        let currentDay = 1;
        let todos = JSON.parse(localStorage.getItem('travel_todos')) || [{ text: "護照", done: false }, { text: "日幣", done: false }];
        let shopItems = JSON.parse(localStorage.getItem('travel_shop')) || [];
        let base64Img = "";
        let startX = 0;
        let activeSwipeItem = null;

        function fetchWeather() {
            fetch('https://api.open-meteo.com/v1/forecast?latitude=35.6895&longitude=139.6917&current_weather=true')
                .then(r => r.json())
                .then(d => { document.getElementById('weather-temp').innerText = `東京 ${Math.round(d.current_weather.temperature)}°C`; })
                .catch(() => { document.getElementById('weather-temp').innerText = '東京 14°C'; });
        }

        function switchTab(tab) {
            document.querySelectorAll('main').forEach(s => s.classList.add('hidden-section'));
            document.querySelectorAll('nav .flex-1').forEach(n => { n.classList.remove('active-tab', 'text-morandi-rose'); n.classList.add('text-gray-400'); });
            document.getElementById(`${tab}-section`).classList.remove('hidden-section');
            document.getElementById(`nav-${tab}`).classList.add('active-tab', 'text-morandi-rose');
            document.getElementById('date-nav').style.display = (tab === 'itinerary') ? 'flex' : 'none';
            if (tab === 'itinerary') renderDay(currentDay);
            else if (tab === 'checklist') { document.getElementById('main-title').innerText = "行前準備"; renderTodos(); }
            else if (tab === 'shopping') { document.getElementById('main-title').innerText = "購物清單"; renderShopItems(); }
        }

        function renderDay(dayNum) {
            currentDay = dayNum;
            const data = itinerary[dayNum];
            document.getElementById('main-title').innerText = data.title;
            document.getElementById('sub-title').innerText = data.date;
            document.querySelectorAll('#date-nav button').forEach(btn => { btn.classList.remove('active-day'); btn.classList.add('text-gray-400'); });
            document.getElementById(`btn-${dayNum}`).classList.add('active-day');
            document.getElementById('timeline-content').innerHTML = data.events.map(ev => `
                <div class="relative mb-8 pl-12"><div class="absolute left-[16px] top-1 w-6 h-6 bg-white border-4 border-morandi-rose rounded-full z-10"></div><div class="bg-white p-5 rounded-3xl shadow-sm border border-[#eee8df]"><span class="text-xs font-bold text-cocoa-brown/80">${ev.time}</span><h3 class="text-lg font-bold text-cocoa-brown">${ev.title}</h3><p class="text-sm text-gray-500 mt-1">${ev.desc}</p></div></div>
            `).join('');
        }

        function attachListeners() {
            document.querySelectorAll('.swipe-item').forEach(item => {
                item.addEventListener('touchstart', e => { startX = e.touches[0].clientX; if (activeSwipeItem && activeSwipeItem !== item) activeSwipeItem.classList.remove('swiped'); });
                item.addEventListener('touchend', e => { let endX = e.changedTouches[0].clientX; if (startX - endX > 50) { item.classList.add('swiped'); activeSwipeItem = item; } else if (endX - startX > 50) { item.classList.remove('swiped'); } });
            });
        }

        function renderTodos() {
            document.getElementById('todo-list').innerHTML = todos.map((t, i) => `<li class="swipe-item mb-3"><div class="swipe-delete-btn" onclick="deleteTodo(${i})">刪除</div><div class="swipe-content flex items-center gap-4 p-4" onclick="toggleTodo(${i})"><div class="w-6 h-6 rounded-full border-2 flex items-center justify-center ${t.done ? 'bg-morandi-rose border-morandi-rose text-white' : 'border-gray-200 text-transparent'}"><i class="fas fa-check text-[10px]"></i></div><span class="text-sm font-medium ${t.done ? 'checked-text' : ''}">${t.text}</span></div></li>`).join('');
            attachListeners();
            localStorage.setItem('travel_todos', JSON.stringify(todos));
        }

        function renderShopItems() {
            document.getElementById('shop-list').innerHTML = shopItems.map((s, i) => `<div class="swipe-item mb-4"><div class="swipe-delete-btn" onclick="deleteShop(${i})">刪除</div><div class="swipe-content flex items-center gap-4 p-4" onclick="toggleShop(${i})"><div class="w-6 h-6 rounded-full border-2 flex items-center justify-center ${s.done ? 'bg-morandi-rose border-morandi-rose text-white' : 'border-gray-200 text-transparent'}"><i class="fas fa-check text-[10px]"></i></div>${s.img ? `<img src="${s.img}" class="w-14 h-14 rounded-xl object-cover">` : `<div class="w-14 h-14 rounded-xl bg-gray-100 flex items-center justify-center text-[10px] text-gray-400">無圖</div>`}<div class="flex-1"><h4 class="font-bold text-sm ${s.done ? 'checked-text' : ''}">${s.name}</h4><p class="text-[10px] text-gray-400 font-bold">數量：${s.count}</p></div></div></div>`).join('');
            attachListeners();
            localStorage.setItem('travel_shop', JSON.stringify(shopItems));
        }

        window.addTodo = () => { const input = document.getElementById('todo-input'); if (input.value) { todos.push({ text: input.value, done: false }); input.value = ''; renderTodos(); } };
        window.toggleTodo = (i) => { todos[i].done = !todos[i].done; renderTodos(); };
        window.deleteTodo = (i) => { todos.splice(i, 1); renderTodos(); };
        window.toggleShop = (i) => { shopItems[i].done = !shopItems[i].done; renderShopItems(); };
        window.deleteShop = (i) => { shopItems.splice(i, 1); renderShopItems(); };
        window.clearBoughtItems = () => { if (confirm("清除已購買項目嗎？")) { shopItems = shopItems.filter(s => !s.done); renderShopItems(); } };

        window.previewFile = () => {
            const file = document.getElementById('shop-file').files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                const img = new Image(); img.src = reader.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                    const maxW = 300; const scale = maxW / img.width;
                    canvas.width = maxW; canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    base64Img = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('img-preview').src = base64Img;
                    document.getElementById('img-preview-box').classList.remove('hidden');
                    document.getElementById('file-status').innerText = "已選圖";
                };
            };
            if (file) reader.readAsDataURL(file);
        };

        window.addShopItem = () => {
            const name = document.getElementById('shop-name').value;
            const count = document.getElementById('shop-count').value || 1;
            if (!name) return;
            shopItems.push({ name, count, img: base64Img, done: false });
            document.getElementById('shop-name').value = ''; document.getElementById('shop-count').value = ''; document.getElementById('file-status').innerText = "拍商品圖";
            document.getElementById('img-preview-box').classList.add('hidden');
            base64Img = ""; renderShopItems();
        };

        window.onload = () => { fetchWeather(); switchTab('itinerary'); };
    </script>
</body>
</html>
