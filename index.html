<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>東京旅遊手冊 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'morandi-rose': '#bf9d96',
                        'cocoa-brown': '#6f5643',
                        'oatmeal': '#f4f1ea',
                        'fog-blue': '#9bb7c1',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f4f1ea; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; color: #555; }
        .timeline-line { position: absolute; left: 28px; top: 0; bottom: 0; width: 2px; background: #cbd5e1; z-index: 0; }
        .active-day { background-color: #bf9d96 !important; color: white !important; transform: scale(1.05); }
        .glass-nav { background: rgba(244, 241, 234, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding-bottom: env(safe-area-inset-bottom); }
        .card { transition: all 0.2s ease-out; }
        .checked { text-decoration: line-through; opacity: 0.5; }
        .hidden-section { display: none; }
        input::placeholder { font-size: 0.8rem; opacity: 0.6; }
    </style>
</head>
<body class="pb-40">

    <header class="sticky top-0 z-30 bg-oatmeal/95 backdrop-blur-sm p-5 border-b border-[#e2dfd9] text-center">
        <h1 id="main-title" class="text-xl font-extrabold text-cocoa-brown tracking-tight">Day 1：啟程與新宿</h1>
        <p id="sub-title" class="text-xs text-gray-500 mt-2">2026/04/10 (五) | 東京 14°C 晴</p>
    </header>

    <main id="itinerary-section" class="relative p-6 max-w-md mx-auto min-h-screen">
        <div class="timeline-line"></div>
        <div id="timeline-content"></div>
    </main>

    <main id="checklist-section" class="hidden-section p-6 max-w-md mx-auto min-h-screen">
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-[#eee8df]">
            <h2 class="text-lg font-bold text-cocoa-brown mb-4"><i class="fas fa-passport mr-2"></i>行前準備</h2>
            <div class="flex gap-2 mb-6">
                <input type="text" id="todo-input" placeholder="例：護照、日幣..." class="flex-1 px-4 py-2 rounded-xl border border-gray-100 bg-gray-50 text-sm">
                <button onclick="addTodo()" class="bg-morandi-rose text-white px-4 py-2 rounded-xl text-sm font-bold">新增</button>
            </div>
            <ul id="todo-list" class="space-y-3"></ul>
        </div>
    </main>

    <main id="shopping-section" class="hidden-section p-6 max-w-md mx-auto min-h-screen">
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-[#eee8df]">
            <h2 class="text-lg font-bold text-cocoa-brown mb-4"><i class="fas fa-shopping-bag mr-2"></i>購物清單</h2>
            
            <div class="space-y-2 mb-6 p-4 bg-gray-50 rounded-2xl border border-gray-100">
                <input type="text" id="shop-name" placeholder="商品名稱" class="w-full px-3 py-2 rounded-lg border border-gray-100 text-sm mb-2">
                <div class="flex gap-2">
                    <input type="number" id="shop-count" placeholder="數量" class="w-20 px-3 py-2 rounded-lg border border-gray-100 text-sm">
                    <input type="text" id="shop-img" placeholder="圖片網址 (選填)" class="flex-1 px-3 py-2 rounded-lg border border-gray-100 text-sm">
                </div>
                <button onclick="addShopItem()" class="w-full mt-2 bg-cocoa-brown text-white py-2 rounded-lg text-sm font-bold">新增商品</button>
            </div>

            <div id="shop-list" class="space-y-4"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass-nav border-t border-[#e2dfd9] px-2 py-3 z-40">
        <div class="flex justify-around items-center mb-3 px-4">
            <button onclick="switchTab('itinerary')" id="nav-itinerary" class="text-xs font-bold px-4 py-2 rounded-full active-day"><i class="fas fa-map mr-1"></i>行程</button>
            <button onclick="switchTab('checklist')" id="nav-checklist" class="text-xs font-bold px-4 py-2 rounded-full text-gray-400"><i class="fas fa-check-square mr-1"></i>準備</button>
            <button onclick="switchTab('shopping')" id="nav-shopping" class="text-xs font-bold px-4 py-2 rounded-full text-gray-400"><i class="fas fa-cart-plus mr-1"></i>購物</button>
        </div>
        <div id="date-nav" class="flex justify-around items-center border-t border-gray-100 pt-3">
            <button onclick="renderDay(1)" id="btn-1" class="w-10 h-10 rounded-xl bg-white text-[10px] font-bold border border-gray-200">4/10</button>
            <button onclick="renderDay(2)" id="btn-2" class="w-10 h-10 rounded-xl bg-white text-[10px] font-bold border border-gray-200">4/11</button>
            <button onclick="renderDay(3)" id="btn-3" class="w-10 h-10 rounded-xl bg-white text-[10px] font-bold border border-gray-200">4/12</button>
            <button onclick="renderDay(4)" id="btn-4" class="w-10 h-10 rounded-xl bg-white text-[10px] font-bold border border-gray-200">4/13</button>
            <button onclick="renderDay(5)" id="btn-5" class="w-10 h-10 rounded-xl bg-white text-[10px] font-bold border border-gray-200">4/14</button>
        </div>
    </nav>

    <script>
        // --- 行程資料 ---
        const itinerary = {
            1: { title: "Day 1：啟程與新宿", date: "2026/04/10 (五)", events: [{ time: "08:30", icon: "plane", title: "星宇 JX800", desc: "桃園 ➔ 成田" }, { time: "16:00", icon: "hotel", title: "飯店 Check-in", desc: "新宿地區" }] },
            2: { title: "Day 2：河口湖探險", date: "2026/04/11 (六)", events: [{ time: "09:00", icon: "bus", title: "巴士前往河口湖", desc: "看富士山" }] },
            3: { title: "Day 3：東京市區", date: "2026/04/12 (日)", events: [{ time: "10:00", icon: "shopping-bag", title: "澀谷/原宿", desc: "" }] },
            4: { title: "Day 4：上野賞櫻", date: "2026/04/13 (一)", events: [{ time: "11:00", icon: "tree", title: "上野公園", desc: "" }] },
            5: { title: "Day 5：返程採買", date: "2026/04/14 (二)", events: [{ time: "12:00", icon: "plane-departure", title: "前往機場", desc: "回溫暖的家" }] }
        };

        // --- 分頁切換 ---
        function switchTab(tab) {
            const sections = ['itinerary-section', 'checklist-section', 'shopping-section'];
            const navs = ['nav-itinerary', 'nav-checklist', 'nav-shopping'];
            
            sections.forEach(s => document.getElementById(s).classList.add('hidden-section'));
            navs.forEach(n => document.getElementById(n).classList.replace('active-day', 'text-gray-400'));
            
            document.getElementById(`${tab}-section`).classList.remove('hidden-section');
            document.getElementById(`nav-${tab}`).classList.replace('text-gray-400', 'active-day');
            
            document.getElementById('date-nav').style.display = (tab === 'itinerary') ? 'flex' : 'none';

            if(tab === 'itinerary') renderDay(1);
            if(tab === 'checklist') { 
                document.getElementById('main-title').innerText = "行前準備";
                document.getElementById('sub-title').innerText = "細項檢查";
                renderTodos(); 
            }
            if(tab === 'shopping') {
                document.getElementById('main-title').innerText = "藥妝購物清單";
                document.getElementById('sub-title').innerText = "買好買滿！";
                renderShopItems();
            }
        }

        // --- 行程渲染 ---
        function renderDay(dayNum) {
            const data = itinerary[dayNum];
            document.getElementById('main-title').innerText = data.title;
            document.getElementById('sub-title').innerText = data.date;
            document.querySelectorAll('#date-nav button').forEach(btn => btn.style.borderColor = "#e2dfd9");
            document.getElementById(`btn-${dayNum}`).style.borderColor = "#bf9d96";

            document.getElementById('timeline-content').innerHTML = data.events.map(ev => `
                <div class="relative mb-8 pl-12 animate-fade-in">
                    <div class="absolute left-[16px] top-1 w-6 h-6 bg-white border-4 border-morandi-rose rounded-full z-10"></div>
                    <div class="card bg-white p-5 rounded-3xl shadow-sm border border-[#eee8df]">
                        <div class="flex justify-between items-center mb-1"><span class="text-sm font-bold text-cocoa-brown/80">${ev.time}</span><i class="fas fa-${ev.icon} text-gray-200"></i></div>
                        <h3 class="text-lg font-bold text-cocoa-brown">${ev.title}</h3>
                        <p class="text-sm text-gray-500 mt-1">${ev.desc}</p>
                    </div>
                </div>
            `).join('');
        }

        // --- 功能: 準備清單 ---
        let todos = JSON.parse(localStorage.getItem('travel_todos')) || [{ text: "護照", done: false }];
        function renderTodos() {
            document.getElementById('todo-list').innerHTML = todos.map((t, i) => `
                <li class="flex items-center justify-between p-3 bg-gray-50 rounded-xl border border-gray-100" onclick="toggleTodo(${i})">
                    <div class="flex items-center gap-3"><i class="far ${t.done ? 'fa-check-circle text-morandi-rose' : 'fa-circle text-gray-300'}"></i><span class="text-sm ${t.done ? 'checked' : ''}">${t.text}</span></div>
                    <button onclick="event.stopPropagation(); deleteTodo(${i})" class="text-gray-300 px-2"><i class="fas fa-times"></i></button>
                </li>
            `).join('');
            localStorage.setItem('travel_todos', JSON.stringify(todos));
        }
        function addTodo() { 
            const input = document.getElementById('todo-input'); 
            if(input.value) { todos.push({text: input.value, done: false}); input.value=''; renderTodos(); } 
        }
        function toggleTodo(i) { todos[i].done = !todos[i].done; renderTodos(); }
        function deleteTodo(i) { todos.splice(i, 1); renderTodos(); }

        // --- 功能: 購物清單 ---
        let shopItems = JSON.parse(localStorage.getItem('travel_shop')) || [{ name: "合利他命 EX", count: 2, img: "", done: false }];
        function renderShopItems() {
            document.getElementById('shop-list').innerHTML = shopItems.map((s, i) => `
                <div class="flex items-center gap-4 p-4 bg-gray-50 rounded-2xl border border-gray-100 ${s.done ? 'opacity-50' : ''}" onclick="toggleShop(${i})">
                    ${s.img ? `<img src="${s.img}" class="w-16 h-16 rounded-lg object-cover bg-gray-200">` : `<div class="w-16 h-16 rounded-lg bg-gray-200 flex items-center justify-center text-gray-400 text-xs">No Img</div>`}
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <i class="far ${s.done ? 'fa-check-square text-morandi-rose' : 'fa-square text-gray-300'}"></i>
                            <h4 class="font-bold text-cocoa-brown ${s.done ? 'checked' : ''}">${s.name}</h4>
                        </div>
                        <p class="text-xs text-gray-400 mt-1">數量：${s.count}</p>
                    </div>
                    <button onclick="event.stopPropagation(); deleteShop(${i})" class="text-gray-300"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
            localStorage.setItem('travel_shop', JSON.stringify(shopItems));
        }
        function addShopItem() {
            const name = document.getElementById('shop-name').value;
            const count = document.getElementById('shop-count').value || 1;
            const img = document.getElementById('shop-img').value;
            if(!name) return;
            shopItems.push({ name, count, img, done: false });
            document.getElementById('shop-name').value = '';
            document.getElementById('shop-count').value = '';
            document.getElementById('shop-img').value = '';
            renderShopItems();
        }
        function toggleShop(i) { shopItems[i].done = !shopItems[i].done; renderShopItems(); }
        function deleteShop(i) { shopItems.splice(i, 1); renderShopItems(); }

        window.onload = () => renderDay(1);
    </script>
</body>
</html>
